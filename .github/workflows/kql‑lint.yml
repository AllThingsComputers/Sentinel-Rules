name: KQL Syntax Check

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Normalize TXT files
        shell: bash
        run: |
          echo "Normalizing line endings and trimming..."
          find . -name "*.txt" -exec sed -i 's/\r$//' {} \;
          find . -name "*.txt" -exec sed -i 's/[[:space:]]\+$//' {} \;

      - name: Install PowerShell Az modules
        shell: pwsh
        run: |
          Install-Module -Name Az.Kusto -Force -Scope CurrentUser

      - name: Check KQL syntax
        shell: pwsh
        run: |
          $failed = $false
          $files = Get-ChildItem -Recurse -Filter *.txt
          foreach ($f in $files) {
            Write-Host "Checking $($f.FullName)..."
            $content = Get-Content $f.FullName -Raw
            try {
              # Parse using Kusto Language library
              Add-Type -AssemblyName "Microsoft.Azure.Kusto.Language"
              [Microsoft.Azure.Kusto.Language.KustoCode]::Parse($content) | Out-Null
            }
            catch {
              Write-Host "❌ Syntax error in $($f.FullName)"
              $failed = $true
            }
          }

          if ($failed) {
            Write-Host "One or more KQL files have syntax errors."
            exit 1
          } else {
            Write-Host "All KQL syntax checks passed."
          }
