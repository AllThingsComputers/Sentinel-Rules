name: KQL Syntax Check

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 7.0

      - name: Install parser
        run: dotnet tool install -g Kusto.Language.Tool

      - name: Run KQL check
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          FAILED=0
          for f in $(find . -name "*.kql"); do
            echo "Checking $f"
            if ! kusto-parse "$f"; then
              echo "❌ Syntax error in $f"
              FAILED=1
            fi
          done

          if [ $FAILED -eq 1 ]; then
            echo "Some KQL files failed syntax check"
            exit 1
          else
            echo "All KQL files passed syntax check ✅"
          fi
