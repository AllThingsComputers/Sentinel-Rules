name: KQL Syntax Check

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 7.0

      - name: Install Kusto parser
        run: dotnet tool install -g Kusto.Language.Tool

      # Normalize KQL files before linting
      - name: Normalize KQL files
        run: |
          find . -name "*.kql" -exec sed -i 's/\r$//' {} \;
          find . -name "*.kql" -exec sed -i 's/[[:space:]]\+$//' {} \;

      - name: Run KQL syntax check
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          for f in $(find . -name "*.kql"); do
            echo "Checking $f"
            kusto-parse "$f" || exit 1
          done
